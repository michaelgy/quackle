name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows-installer:
    name: Windows installer (Qt 5.15 x64)
    runs-on: windows-latest

    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Get latest CMake
        uses: lukka/get-cmake@latest

      - name: Install Qt 5.15
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          arch: win64_msvc2019_64
          cache: true

      - name: Add MSVC to path
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure and build
        run: |
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 -DQT_VERSION=5 ../quacker
          cmake --build . --config Release

      - name: Deploy Qt dependencies
        run: |
          windeployqt --release build\Release\Quackle.exe

      - name: Extract version from tag
        shell: bash
        run: echo "QUACKLE_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: |
          mkdir installer_output
          iscc quackle_installer.iss
        env:
          QUACKLE_VERSION: ${{ env.QUACKLE_VERSION }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Quackle_Setup_${{ env.QUACKLE_VERSION }}
          path: installer_output\Quackle_Setup_*.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Quackle ${{ env.QUACKLE_VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: installer_output\Quackle_Setup_*.exe
